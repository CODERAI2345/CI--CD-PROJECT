name: Terraform Deployment
on:
 push:
   branches:
   -  main

jobs:
  build:
    environment: dev
    runs-on: ubuntu-latest
    steps:
       - name: checkout
         uses: actions/checkout@v4
       - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
       - name: Terraform Init
        run: terraform init
       - name: Terraform Validate
        run: terraform validate
       - name: Terraform Plan
        run: terraform plan
